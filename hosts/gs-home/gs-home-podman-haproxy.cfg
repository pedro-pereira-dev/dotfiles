global
  maxconn 1024
defaults
  mode http
  default-server check init-addr last,libc,none resolvers default
  timeout client 90s
  timeout connect 5s
  timeout server 60s

frontend reverse_proxy
  bind :80
  # bind :443
  # http-request redirect scheme https code 301 unless { ssl_fc }
  use_backend teste1 if { hdr(host) -i boarede.com }
  use_backend teste1 if { hdr(host) -i teste1.boarede.com }
  use_backend teste2 if { hdr(host) -i teste2.boarede.com }
  default_backend not_found

backend not_found
  http-request return status 404

backend teste1
  server teste1 teste1:80 check
backend teste2
  server teste2 teste2:80 check
