access_control:
  default_policy: "deny"
  rules:
    - domain:
        - "https://www.boarede.com"
        - "https://www.auth.boarede.com"
        - "https://www.ldap.boarede.com"
      policy: "bypass"
    - domain:
        - "https://www.teste1.boarede.com"
        - "https://www.teste2.boarede.com"
      policy: "one_factor"
authentication_backend:
  ldap:
    address: "ldap://ldap:3890"
    base_dn: "dc=boarede,dc=com"
    implementation: "lldap"
    user: "uid=authelia,ou=people,dc=boarede,dc=com"
notifier:
  filesystem:
    filename: "/config/notification.txt"
ntp:
  disable_startup_check: true
server:
  endpoints:
    authz:
      forward-auth:
        implementation: "ForwardAuth"
session:
  cookies:
    - authelia_url: "https://www.auth.boarede.com"
      default_redirection_url: "https://www.boarede.com"
      domain: "boarede.com"
storage:
  local:
    path: "/config/db.sqlite3"
theme: "auto"
