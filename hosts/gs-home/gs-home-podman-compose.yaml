version: "3"
networks:
  private:
  public:
services:
  acme:
    container_name: acme
    image: docker.io/neilpang/acme.sh:latest
    command: daemon
    networks: ["public"]
    volumes:
      - /mnt/data/managed/acme/account:/acme.sh

  haproxy:
    container_name: haproxy
    image: docker.io/haproxy:alpine
    sysctls: ["net.ipv4.ip_unprivileged_port_start=0"]
    networks: ["public"]
    ports: ["80:80", "443:443"]
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - /mnt/data/managed/acme/certs:/certs

  # vaultwarden:
  #   container_name: vaultwarden
  #   image: docker.io/vaultwarden/server:alpine
  #   networks: ["public"]
  #   expose: ["80"]
  #   volumes:
  #     - /mnt/data/managed/vaultwarden:/data

  teste1:
    container_name: teste1
    image: docker.io/traefik/whoami:latest
    environment:
      - WHOAMI_NAME=gs_home_teste1
    networks: ["public"]
    expose: ["80"]

  teste2:
    container_name: teste2
    image: docker.io/traefik/whoami:latest
    environment:
      - WHOAMI_NAME=gs_home_teste2
    networks: ["private"]
    expose: ["80"]
