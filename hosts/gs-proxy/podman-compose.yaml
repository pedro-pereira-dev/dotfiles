version: "3"
services:
  untrusted_reverse_proxy:
    container_name: untrusted_reverse_proxy
    image: docker.io/haproxy:alpine
    ports: ["8080:80"]
    sysctls: ["net.ipv4.ip_unprivileged_port_start=0"]
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

