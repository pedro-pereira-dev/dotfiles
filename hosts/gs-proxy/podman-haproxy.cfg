global
  maxconn 1024
defaults
  mode http
  default-server check init-addr last,libc,none resolvers default
  timeout client 90s
  timeout connect 5s
  timeout server 60s

frontend untrusted_reverse_proxy
  bind :80
  use_backend teste1 if { hdr(host) -i teste1.boarede.com }
  use_backend teste3 if { hdr(host) -i teste3.boarede.com }
  default_backend error

backend error
  http-request return status 404

backend teste1
  server teste1 teste1:80
backend teste3
  server teste3 teste3:80
