# http://fcron.free.fr/doc/en/fcrontab.5.html

# starts podman containers on boot
@runas(__USER__),runatreboot,runonce 1 until \
  podman-compose -f $HOME/.config/podman/compose.yaml up -d --force-recreate --remove-orphans; \
  do sleep 60; done

# dots update && podman-compose down && podman-compose up -d && podman ps -a && podman-compose logs -f
