[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"

[window]
dynamic_padding = true
option_as_alt = "OnlyLeft"
[window.padding]
x = 8
y = 4

[font]
size = 12

[font.normal]
family = "Hack Nerd Font"

[cursor]
blink_interval = 250
blink_timeout = 0

[colors.primary]
background = "#000000"
foreground = "#938aa9"

[colors.normal]
black = "#2c2c3d"
red = "#ff6e6e"
green = "#9ec875"
yellow = "#ffa759"
blue = "#70a7d4"
magenta = "#d291e0"
cyan = "#96e0e0"
white = "#d8dee9"

[colors.bright]
black = "#414166"
red = "#ff8d8d"
green = "#b3d987"
yellow = "#ffc57f"
blue = "#9bb3d3"
magenta = "#ffa1ff"
cyan = "#9cd8d8"
white = "#ffffff"
